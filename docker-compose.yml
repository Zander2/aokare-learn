version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: aokare-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: aokare
      POSTGRES_PASSWORD: aokare_dev_2024
      POSTGRES_DB: aokare_learn
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
